function prepayLoan(id){
  const l=G.loans.find(x=>x.id===id); if(!l) return;
  const maxAmt=Math.min(l.principal, Math.max(0,G.cash));
  if(maxAmt<1){ flash('繰上返済に充てる現金がありません'); return; }
  const def=Math.min(l.principal, Math.max(1, Math.round(maxAmt)));
  let h=`<button class="closex" onclick="finReopen('loan')">×</button><h3>繰上返済</h3>
   <div class="sub">${l.kind}・残高 ${yen(l.principal*1000)}・現金 ${yen(G.cash*1000)}</div>
   <div class="field"><label>返済額 <span class="rangeval" id="ppVal">¥0</span></label>
   <input type="range" id="ppRange" min="100" max="${Math.round(maxAmt)}" step="100" value="${def}" oninput="ppPrev('${id}')"></div>
   <div id="ppInfo" class="card" style="margin:0 0 12px"></div>
   <div class="modal-actions"><button class="btn ghost" onclick="finReopen('loan')">やめる</button>
   <button class="btn gold" onclick="execPrepay('${id}')">指定額を返済</button></div>
   ${G.cash>=l.principal?`<div style="height:6px"></div><button class="btn primary" onclick="execPrepayFull('${id}')">全額完済する（${yen(l.principal*1000)}）</button>`:`<div class="help">全額完済には現金 ${yen(l.principal*1000)} が必要です（現在 ${yen(G.cash*1000)}）。</div>`}`;
  openModal(h); setTimeout(()=>ppPrev(id),0);
}
function ppPrev(id){
  const l=G.loans.find(x=>x.id===id); if(!l)return;
  const amt=+($('ppRange').value||0);
  const newPrin=Math.max(0,l.principal-amt);
  const curPay=annuity(l);
  const newPay= l.termRem>0&&newPrin>0? (l.rate>0? newPrin*(l.rate/12)/(1-Math.pow(1+l.rate/12,-l.termRem)) : newPrin/l.termRem) : 0;
  $('ppVal').textContent=yen(amt*1000);
  $('ppInfo').innerHTML=`${row('返済後の残高',yen(newPrin*1000))}${row('毎月返済額', yen(Math.round(curPay)*1000)+' → '+yen(Math.round(newPay)*1000),'pos')}${row('返済後の現金',yen((G.cash-amt)*1000), (G.cash-amt)>=0?'':'neg')}`;
}
function execPrepay(id){
  const l=G.loans.find(x=>x.id===id); if(!l)return;
  let amt=+($('ppRange').value||0); amt=Math.min(amt,l.principal,Math.max(0,G.cash));
  if(amt<1){ flash('金額が不正です'); return; }
  G.cash-=amt; l.principal-=amt; finCF(-amt);
  if(l.principal<1){ G.loans=G.loans.filter(x=>x.id!==id); pushNews('完済',`${l.kind}を繰上返済で完済しました。`,'good'); }
  else pushNews('繰上返済',`${l.kind}を ${yen(amt*1000)} 繰上返済。残高 ${yen(l.principal*1000)}。`,'good');
  recalcDerived(); save(); render(); flash('繰上返済しました');
  finReopen('loan');
}
function execPrepayFull(id){
  const l=G.loans.find(x=>x.id===id); if(!l)return;
  if(G.cash<l.principal){ flash('全額完済に必要な現金が不足しています'); return; }
  const amt=l.principal;
  G.cash-=amt; finCF(-amt); G.loans=G.loans.filter(x=>x.id!==id);
  pushNews('完済',`${l.kind}を全額完済しました（${yen(amt*1000)}）。`,'good');
  recalcDerived(); save(); render(); flash('全額完済しました'); finReopen('loan');
}

}

/* --- 採用（採用市場から選ぶ） --- */
function actHire(){ if(G.stores.length===1) return doHire(G.stores[0].id); storePicker('doHire','🧑‍🍳 採用'); }
function gradeStars(g){ return '★'.repeat(g)+'☆'.repeat(5-g); }

  let h=`<button class="closex" onclick="closeModal()">×</button><h3>🧑‍🍳 採用 / 人員</h3>
  <div class="sub">${displayName(s)}（${b.name}）　必要人員 ${need.toFixed(1)} / 現有 ${have.toFixed(1)}</div>`;
  if(!hqOK()){
    h+=`<div class="card" style="margin:0 0 10px;border-color:var(--crimson)"><b style="color:var(--crimson)">本社人材が不足しています（${hqCount()}/${requiredHQ()}名）</b><div class="od">店舗・人員の拡大には管理部門が必要です。先に本社人材を採用してください。</div><div class="modal-actions"><button class="btn primary sm" onclick="doHQ()">本社人材を採用</button></div></div>`;
  }
  h+=`<div class="card" style="margin:0 0 10px"><div class="ot" style="font-weight:700;color:var(--ink);margin-bottom:4px">この店の社員（${(s.team||[]).length}名）</div>`;
  (s.team||[]).forEach(m=>{ h+=`<div style="font-size:11.5px;padding:3px 0;border-bottom:1px solid var(--line)"><b>${m.name}</b>（${m.age}歳・${m.pers}）${m.owner?'<span class="badge">店主</span>':''}<br><span style="color:var(--txt-dim)">当業態適性 ${aptOf(m,s.biz)} ／ 月給 ${yen(m.wage*1000)}</span></div>`; });
  h+=`<div class="modal-actions" style="margin-top:6px"><button class="btn ghost sm" onclick="showStaff()">👥 社員管理（異動・昇給）</button></div></div>`;
  // 採用市場
  h+=`<div class="muted" style="margin-bottom:4px">採用市場（${b.name}適性が高い人ほどこの店向き）</div>`;
  (G.recruit.pool||[]).forEach((c,i)=>{ const apt=aptOf(c,s.biz); const aptCol=apt>=70?'var(--green)':apt>=50?'var(--gold-bright)':'var(--txt-dim)';
    h+=`<div class="opt" onclick="hireCandidate('${sid}',${i})">
      <div class="ot">${c.name}（${c.age}歳）${gradeStars(c.grade)}<span class="price">月給希望 ${yen(c.wage*1000)}</span></div>
      <div class="od">性格:${c.pers}／得意:${BIZ[c.spec].name}／<b style="color:${aptCol}">この店での適性 ${apt}</b></div></div>`; });
  h+=`<div class="opt"><div class="ot">アルバイト（月給 ${yen(avgWagePart()*1000)}）<span class="price">現在 ${s.staffPart}名</span></div>
  <div class="modal-actions"><button class="btn ghost sm" onclick="hire('${sid}','part')">+1名</button>
  <button class="btn ghost sm" onclick="fire('${sid}','part')">-1名</button></div></div>`;
  h+=`<div class="help">採用市場の顔ぶれは数ヶ月で入れ替わります。<b>欲しい人材が常にいるとは限りません</b>。高級業態（寿司・フレンチ等）は適性の高い社員でないと満足度が上がりにくいです。</div>`;
  openModal(h);
}
function hireCandidate(sid, idx){
  const s=byId(sid); if(!s)return;
  if(!hqOK()){ flash('本社人材が不足。先に本社人材を採用してください'); doHQ(); return; }
  const c=(G.recruit.pool||[])[idx]; if(!c){ flash('その候補は既にいません'); return; }
  G.recruit.pool.splice(idx,1);
  if(!s.team) s.team=[]; s.team.push(c); s.staffFull=s.team.length;
  recalcDerived(); save(); render(); flash(`${c.name}（適性${aptOf(c,s.biz)}）が入社`); doHire(sid);
}
function hire(sid,kind){ const s=byId(sid);
  if(kind==='part'){ if(!hqOK()){ flash('本社人材が不足。先に本社人材を採用してください'); doHQ(); return; } s.staffPart++; recalcDerived(); save(); render(); flash('アルバイトを採用'); }
  doHire(sid);
}
function fire(sid,kind){ const s=byId(sid);
  if(kind==='part'&&s.staffPart>0){ s.staffPart--; flash('アルバイトを1名減らしました'); }
  save(); render(); doHire(sid);
}

/* --- 本社人材（管理部門） --- */
function doHQ(){
  const req=requiredHQ(), cur=hqCount(); const wage=expectedWage(38,4);
  let h=`<button class="closex" onclick="closeModal()">×</button><h3>🏢 本社人材（管理部門）</h3>
   <div class="sub">必要 ${req}名 / 現在 ${cur}名　${cur>=req?'<span style="color:var(--green)">充足</span>':'<span style="color:var(--crimson)">不足</span>'}</div>
   <div class="help">店舗数・現場人員が増えると、SV（店舗巡回）・経理・人事といった管理人材が必要になります。<b>不足すると新規出店や追加採用ができません</b>。給与は本部費に計上されます（目安：5店に1名＋現場35人に1名）。</div>`;
  (G.hqStaff||[]).forEach((m,i)=>{ h+=`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)"><b>${m.name}</b>（${m.age}歳・${m.role}）月給 ${yen(m.wage*1000)}<button class="btn ghost sm" style="float:right;width:auto" onclick="fireHQ(${i})">退職</button></div>`; });
  h+=`<div class="opt" onclick="hireHQ()"><div class="ot">本社人材を採用<span class="price">月給 ${yen(wage*1000)}</span></div><div class="od">管理部門を1名増員</div></div>
   <button class="btn primary" onclick="closeModal()">とじる</button>`;
  openModal(h);
}
function hireHQ(){ const wage=expectedWage(38,4); G.hqStaff=G.hqStaff||[]; G.hqStaff.push({name:pick(EMP_SEI)+pick(EMP_MEI),age:Math.round(rnd(30,50)),wage,role:pick(['SV','経理','人事','商品開発','店舗開発']),since:G.turn}); recalcDerived(); save();
  // 出店保留があり、本社人材が要件を満たしたら自動で出店を実行
  if(G._pendingStore){
    const futureReqHQ=(G.stores.length+1<=2?0:Math.ceil((G.stores.length+1)/5)+Math.floor(totalFieldStaff()/35));
    if(hqCount()>=futureReqHQ){ const ps=G._pendingStore; G._pendingStore=null; closeModal(); NS=ps; flash('本社人材を採用。保留していた出店を実行します'); execNewStore(); return; }
    render(); flash('本社人材を採用しました（出店要件まであと'+(futureReqHQ-hqCount())+'名）'); doHQ(); return;
  }
  render(); flash('本社人材を採用しました'); doHQ();
}
function fireHQ(i){ if(G.hqStaff&&G.hqStaff[i]){ const m=G.hqStaff.splice(i,1)[0]; save(); render(); flash(`${m.name}（本社）が退職`); } doHQ(); }

/* --- 社員管理（異動・昇給・退職） --- */
function findEmp(sid,eid){ const s=byId(sid); if(!s)return null; return (s.team||[]).find(m=>m.id===eid); }
function showStaff(){
  let h=`<button class="closex" onclick="closeModal()">×</button><h3>👥 社員管理</h3><div class="sub">本社 ${hqCount()}/${requiredHQ()}名　｜　異動は同一地域内のみ可</div>`;

    h+=`<div class="card" style="margin:0 0 8px"><div class="ot" style="font-weight:700;color:var(--ink)">${BIZ[s.biz].emoji} ${displayName(s)}<span class="price" style="font-weight:600">${l.name}・適性平均${Math.round(staffAptitude(s))}</span></div>`;
    (s.team||[]).forEach(m=>{ const exp=expectedWage(m.age,m.grade); const under=m.wage<exp*0.97;

        <b>${m.name}</b>（${m.age}歳・${m.pers}）${m.owner?'<span class="badge">店主</span>':''} 適性${aptOf(m,s.biz)}・月給${yen(m.wage*1000)} ${under?'<span style="color:var(--crimson)">⚠薄給(離職リスク)</span>':''}
        ${m.owner?'':`<div class="modal-actions" style="margin-top:3px">
        <button class="btn ghost sm" onclick="raiseEmp('${s.id}','${m.id}')">昇給</button>
        <button class="btn ghost sm" onclick="transferEmp('${s.id}','${m.id}')">異動</button>
        <button class="btn ghost sm" onclick="fireEmp('${s.id}','${m.id}')">退職</button></div>`}
        </div>`; });
    if(!(s.team||[]).length) h+=`<div class="muted">社員なし</div>`;
    h+=`</div>`;
  });
  // 待機人員（閉店で本社預かりとなった社員。給与が発生し続ける）
  if(G.bench && G.bench.length){
    h+=`<div class="card" style="margin:0 0 8px;border:1.5px solid rgba(156,42,42,.4)"><div class="ot" style="font-weight:700;color:var(--crimson)">待機人員（本社預かり）<span class="price" style="font-weight:600">${G.bench.length}名・月給計 ${yen(G.bench.reduce((t,m)=>t+(m.wage||0),0)*1000)}</span></div>
     <div class="od" style="margin-bottom:4px">閉店で行き場を失った社員です。給与が発生し続けます。他店へ配置するか、退職金（給与3ヶ月分）を払って整理してください。</div>`;
    G.bench.forEach((m,i)=>{ h+=`<div style="font-size:11.5px;padding:5px 0;border-bottom:1px solid var(--line)"><b>${m.name}</b>（${m.age}歳・${m.spec?BIZ[m.spec].name+'出身':'—'}）月給${yen(m.wage*1000)}
       <div class="modal-actions" style="margin-top:3px"><button class="btn ghost sm" onclick="benchAssign(${i})">配置</button><button class="btn ghost sm" onclick="benchLayoff(${i})">退職金を払って整理</button></div></div>`; });
    h+=`</div>`;
  }

}
function benchAssign(i){ const m=(G.bench||[])[i]; if(!m)return;
  if(!G.stores.length){ flash('配置先の店舗がありません'); return; }
  let h=`<button class="closex" onclick="showStaff()">×</button><h3>待機人員の配置</h3><div class="sub">${m.name} の配置先を選択</div>`;
  G.stores.forEach(o=>{ h+=`<div class="opt" onclick="doBenchAssign(${i},'${o.id}')"><div class="ot">${BIZ[o.biz].emoji} ${o.name}<span class="price">${loc(o).name}</span></div><div class="od">この店での適性 ${aptOf(m,o.biz)}</div></div>`; });
  openModal(h);
}
function doBenchAssign(i,toId){ const m=(G.bench||[])[i]; const o=byId(toId); if(!m||!o)return;
  G.bench.splice(i,1); o.team=o.team||[]; o.team.push(m); o.staffFull=o.team.length;
  recalcDerived(); save(); render(); flash(`${m.name} を ${o.name} に配置`); showStaff();
}
function benchLayoff(i){ const m=(G.bench||[])[i]; if(!m)return;
  const severance=Math.round((m.wage||0)*3); // 退職金＝給与3ヶ月分
  if(G.cash<severance){ flash(`退職金 ${yen(severance*1000)} に足りません`); return; }
  G.cash-=severance; G.bench.splice(i,1);
  G.reputation=clamp((G.reputation||52)-1.0,0,100);
  recalcDerived(); save(); render(); flash(`${m.name} を退職金 ${yen(severance*1000)} で整理`); showStaff();
}
/* --- 賞与（ボーナス）：水準で忠誠心が変動 --- */
function allRegularEmployees(){ // 賞与対象（社員・本社・待機。アルバイトは対象外）
  const list=[];
  G.stores.forEach(s=>(s.team||[]).forEach(m=>list.push(m)));
  (G.hqStaff||[]).forEach(m=>list.push(m));
  (G.bench||[]).forEach(m=>list.push(m));
  return list;
}
function bonusLoyaltyDelta(mult){ // 月給倍率→忠誠心変化
  if(mult>=3.7) return {d:+0.12, label:'急上昇', cls:'good'};
  if(mult>3.3)  return {d:+0.05, label:'ちょい向上', cls:'good'};
  if(mult>=2.5) return {d:+0.01, label:'横ばい', cls:'neutral'};
  if(mult>=2.0) return {d:-0.05, label:'下落', cls:'bad'};
  return {d:-0.13, label:'暴落', cls:'bad'};
}
function showBonusEvent(){
  const season=G._bonusEvent||'賞与'; G._bonusEvent=null;
  const emps=allRegularEmployees(); const base=emps.reduce((t,m)=>t+(m.wage||0),0);
  if(!emps.length){ return; }
  const avgLoy=Math.round(emps.reduce((t,m)=>t+(m.loyalty!=null?m.loyalty:0.45),0)/emps.length*100);
  let h=`<button class="closex" onclick="closeBonusEvent()">×</button><h3>🎁 ${season}賞与の査定</h3>
   <div class="sub">${G.year}年目 ${monthName(G.month)}・対象 ${emps.length}名／月給合計 ${yen(base*1000)}・平均忠誠心 ${avgLoy}</div>
   <div class="help" style="margin:6px 0 10px">${season}賞与の支給水準を決めてください。手厚いほど忠誠心が上がり離職を抑えますが、現金を圧迫します（法定福利費15%込み）。本社から遠い店ほど忠誠心は下がりやすいので、賞与で繋ぎ留める意味があります。</div>`;
  [0,2.0,2.5,3.0,3.5,4.0].forEach(mult=>{
    const cost=Math.round(base*mult*1.15); const eff=bonusLoyaltyDelta(mult); const afford=G.cash>=cost;
    const col=eff.cls==='good'?'var(--green)':eff.cls==='bad'?'var(--crimson)':'var(--txt-dim)';
    const label=mult===0?'見送る（支給なし）':`月給 ${mult.toFixed(1)}ヶ月分`;
    h+=`<div class="opt ${afford?'':'dis'}" ${afford?`onclick="execBonusEvent(${mult})"`:''} style="${afford?'':'opacity:.5'}">
      <div class="ot">${label}<span class="price">${mult===0?'¥0':yen(cost*1000)}${afford?'':'（資金不足）'}</span></div>
      <div class="od">忠誠心：<b style="color:${col}">${mult===0?'下落':eff.label}</b>（${eff.d>0?'+':''}${eff.d.toFixed(2)}）</div></div>`;
  });
  openModal(h);
}
function execBonusEvent(mult){
  const emps=allRegularEmployees(); const base=emps.reduce((t,m)=>t+(m.wage||0),0);
  const cost=Math.round(base*mult*1.15);
  if(G.cash<cost){ flash('資金が不足しています'); return; }
  const eff=bonusLoyaltyDelta(mult);
  if(cost>0){ G.cash-=cost; G._bonusAcc=(G._bonusAcc||0)+cost; }
  recalcDerived();
  emps.forEach(m=>{ m.loyalty=clamp((m.loyalty!=null?m.loyalty:0.45)+eff.d, 0.03, 0.98); });
  pushNews('賞与査定',`${mult===0?'賞与を見送り':`${mult.toFixed(1)}ヶ月分の賞与（${yen(cost*1000)}）を支給`}。忠誠心は${mult===0?'下落':eff.label}。`, eff.cls);
  closeBonusEvent(); save(); render(); flash(mult===0?'賞与を見送りました（忠誠心下落）':`賞与を支給（忠誠心${eff.label}）`);
}
function closeBonusEvent(){ closeModal(); }
function doBonus(){
  const emps=allRegularEmployees(); const base=emps.reduce((t,m)=>t+(m.wage||0),0);
  if(!emps.length){ openModal(`<button class="closex" onclick="closeModal()">×</button><h3>🎁 賞与（ボーナス）</h3><div class="sub">対象となる社員がいません。</div>`); return; }
  let h=`<button class="closex" onclick="closeModal()">×</button><h3>🎁 賞与（ボーナス）の支給</h3>
   <div class="sub">対象 ${emps.length}名（社員・本社・待機人員）／月給合計 ${yen(base*1000)}</div>
   <div class="help" style="margin:6px 0 10px">賞与の水準（月給の何倍か）で忠誠心が変動します：<b>3.7倍超で急上昇</b>／3.3倍超でちょい向上／2.5〜3.3倍は横ばい／<b>2.5倍未満で下落</b>／<b>2倍未満で暴落</b>。法定福利費（15%）も会社負担です。</div>`;
  [1.0,2.0,2.5,3.0,3.5,4.0].forEach(mult=>{
    const cost=Math.round(base*mult*1.15); const eff=bonusLoyaltyDelta(mult); const afford=G.cash>=cost;
    const col=eff.cls==='good'?'var(--green)':eff.cls==='bad'?'var(--crimson)':'var(--txt-dim)';
    h+=`<div class="opt ${afford?'':'dis'}" ${afford?`onclick="execBonus(${mult})"`:''} style="${afford?'':'opacity:.5'}">
      <div class="ot">月給 ${mult.toFixed(1)}ヶ月分<span class="price">${yen(cost*1000)}${afford?'':'（資金不足）'}</span></div>
      <div class="od">忠誠心：<b style="color:${col}">${eff.label}</b>（${eff.d>0?'+':''}${eff.d.toFixed(2)}）</div></div>`;
  });
  h+=`<div class="help">賞与は当月の人件費として現金支出します。高い忠誠心は離職を抑えます。</div>`;
  openModal(h);
}
function execBonus(mult){
  const emps=allRegularEmployees(); const base=emps.reduce((t,m)=>t+(m.wage||0),0);
  const cost=Math.round(base*mult*1.15);
  if(G.cash<cost){ flash('資金が不足しています'); return; }
  const eff=bonusLoyaltyDelta(mult);
  G.cash-=cost; recalcDerived();
  emps.forEach(m=>{ m.loyalty=clamp((m.loyalty!=null?m.loyalty:0.45)+eff.d, 0.03, 0.98); });
  G._bonusAcc=(G._bonusAcc||0)+cost; // P/L人件費に当月加算
  pushNews('賞与支給',`月給${mult.toFixed(1)}ヶ月分の賞与（${yen(cost*1000)}）を支給。忠誠心は${eff.label}。`, eff.cls);
  closeModal(); save(); render(); flash(`賞与を支給しました（忠誠心${eff.label}）`);
}
function raiseEmp(sid,eid){ const m=findEmp(sid,eid); if(!m)return; const exp=expectedWage(m.age,m.grade); m.wage=Math.max(m.wage+8, Math.round(exp*1.02)); recalcDerived(); save(); render(); flash(`${m.name}を昇給（月給 ${yen(m.wage*1000)}）`); showStaff(); }
function fireEmp(sid,eid){ const s=byId(sid); if(!s)return; const i=(s.team||[]).findIndex(m=>m.id===eid); if(i<0)return; const m=s.team[i]; if(m.owner)return; s.team.splice(i,1); s.staffFull=s.team.length; recalcDerived(); save(); render(); flash(`${m.name} が退職`); showStaff(); }
function transferEmp(sid,eid){ const s=byId(sid), l=loc(s); const m=findEmp(sid,eid); if(!m)return;
  const targets=G.stores.filter(o=>o.id!==sid && loc(o).region===l.region);
  if(!targets.length){ flash('同一地域に異動先の店舗がありません'); return; }
  let h=`<button class="closex" onclick="showStaff()">×</button><h3>異動先（${l.region}内）</h3><div class="sub">${m.name} の異動先を選択</div>`;
  targets.forEach(o=>{ h+=`<div class="opt" onclick="doTransfer('${sid}','${eid}','${o.id}')"><div class="ot">${BIZ[o.biz].emoji} ${o.name}<span class="price">${loc(o).name}</span></div><div class="od">この店での適性 ${aptOf(m,o.biz)}</div></div>`; });
  openModal(h);
}
function doTransfer(sid,eid,toId){ const s=byId(sid), o=byId(toId); if(!s||!o)return; const i=(s.team||[]).findIndex(m=>m.id===eid); if(i<0)return;
  const m=s.team.splice(i,1)[0]; s.staffFull=s.team.length; o.team=o.team||[]; o.team.push(m); o.staffFull=o.team.length;
  recalcDerived(); save(); render(); flash(`${m.name} を ${o.name} へ異動`); showStaff();
}

/* --- 取引金融機関 --- */

   <div class="sub">年商 ${yen(sales*1000)}／取引中 ${G.banks.length}行（複数行と取引でき、借入時に選べます）</div>`;

     <div class="ot">${bk.name}${est?'<span class="badge">取引中</span>':''}<span class="price">${bk.maxLoan===Infinity?'上限なし':'最大'+yen(bk.maxLoan*1000)}</span></div>
     <div class="od">${bk.desc}<br>総与信枠 年商の${Math.round(bk.totalPct*100)}%／運転資金 年商の${Math.round(bk.wcPct*100)}%${bk.minSales>0?'／要 年商'+yen(bk.minSales*1000):''}${cond?'':'<span style="color:var(--crimson)"> ※年商条件未達</span>'}`;

function investCustom(kind){
  const el=document.getElementById(kind==='dep'?'depAmt':'fundAmt'); if(!el) return;
  const man=parseFloat(el.value); if(!man||isNaN(man)){ flash('金額（万円）を入力してください'); return; }
  const amt=Math.round(man*10); // 万円→千円（1万円=10千円）
  if(amt<0){ // 一部解約（売却）
    const bal=kind==='dep'?(G.deposits||0):(G.funds||0); const sell=Math.min(-amt, bal);
    if(sell<=0){ flash('残高がありません'); return; }
    if(kind==='dep'){ G.deposits-=sell; }
    else { const ratio=sell/Math.max(1,G.funds); G.fundCost=Math.round((G.fundCost||0)*(1-ratio)); G.funds-=sell; }
    G.cash+=sell; invCF(sell);
  } else { investMove(kind, amt); return; }
  recalcDerived(); save(); render(); showInvest();
}
function investMove(kind,amt){
  if(kind==='dep'){ if(amt<0){ const r=(G.deposits||0); G.cash+=r; G.deposits=0; invCF(r); } else { const a=Math.min(amt,G.cash); if(a<=0){flash('現金が不足しています');return;} G.cash-=a; G.deposits=(G.deposits||0)+a; invCF(-a); } }
  else { if(amt<0){ const r=(G.funds||0); G.cash+=r; G.funds=0; G.fundCost=0; invCF(r); } else { const a=Math.min(amt,G.cash); if(a<=0){flash('現金が不足しています');return;} G.cash-=a; G.funds=(G.funds||0)+a; G.fundCost=(G.fundCost||0)+a; invCF(-a); } }
  recalcDerived(); save(); render(); showInvest();
}

/* --- 銀行融資の提案（設備・不動産・運転資金） --- */
function bankFinance(purpose, principal, term, label, key, onDone){
  principal=Math.round(principal);
  key = key || bestBankFor(purpose, principal) || G.bank;
  if(!isEstablished(key)){ flash(`${BANKS[key].name}とは未取引です。先に取引を開始してください`); return false; }
  const maxB=maxBorrowFrom(purpose, key);
  if(principal>maxB){ flash(`${BANKS[key].name}の借入余力が不足（${yen(maxB*1000)}まで）`); return false; }
  const rate=loanRate(purpose, key);
  G.loans.push({id:uid(), kind:label, purpose, principal, rate, termTotal:term, termRem:term, bank:key});
  G.cash+=principal; finCF(principal); recalcDerived();
  pushNews('借入',`${BANKS[key].name}より${label} ${yen(principal*1000)}（金利${(rate*100).toFixed(2)}%・${Math.round(term/12)}年）を実行。`,'neutral');
  if(onDone) onDone();
  return true;
}

   <div class="sub">${title}　${yen(Math.round(principal)*1000)}</div>`;
  banks.sort((a,b)=>loanRate(purpose,a)-loanRate(purpose,b)).forEach(k=>{ const bk=BANKS[k];
    h+=`<div class="opt" onclick="bankPick('${k}')">

  G.chains[id]={id, name:brandName, biz:bk, menu:Math.round(bestMenu), concept:conc}; // 先頭店の名をブランド名に
  free.forEach((s,i)=>{ s.chainId=id; if(!s.branchLabel) s.branchLabel = (i===0?'本':loc(s).name); });
  save(); render(); flash(`「${G.chains[id].name}」を設立（${free.length}店）`); doChains();

function loanPreview(){ const amt=+$('loanRange').value, term=+$('loanTerm').value, rate=loanRate('wc',null,term);

function execLoan(){ const amt=+$('loanRange').value, term=+$('loanTerm').value;

function storeRentRaw(l,b,parking){ let tsubo=b.seats*0.7+8; let r=tsubo*l.rent; if(parking)r+=l.rent*6; return Math.round(r); }
function landPriceOf(l,b,parking){
  // 不動産価値＝賃料の資本還元（≒15〜25年分／プライム立地ほど高倍率＝低利回り）
  const monthlyRent=storeRentRaw(l,b,parking);
  const mult=180 + l.land*22;
  return Math.round(monthlyRent*mult);
}
// 取得額を 建物(45%・30年償却) と 土地(55%・非償却) に按分して計上
function setOwnership(s, price){
  const bldg=Math.round(price*0.45), land=price-bldg;
  s.buildingBook=(s.buildingBook||0)+bldg;
  s.bldgDep=(s.bldgDep||0)+bldg/360;
  s.landBook=(s.landBook||0)+land;
  s.ownsLand=true;
}
function execNewStore(){
  const isGen=GENERIC_LOCS.includes(NS.loc);
  const l=loc({locId:NS.loc, pref:isGen?NS.pref:''}), b=BIZ[NS.biz];
  // 本社人材ゲート：出店後の店舗数に必要な本社人材が無ければ「出店は実行せず」採用画面へ誘導
  const futureStores=G.stores.length+1;
  const futureReqHQ=(futureStores<=2?0:Math.ceil(futureStores/5)+Math.floor(totalFieldStaff()/35));
  if(hqCount()<futureReqHQ){
    G._pendingStore={...NS};   // 出店内容を保留し、本社採用後に自動実行
    flash('本社人材が不足。先に本社人材を採用してください（採用すると自動で出店します）');
    closeModal(); doHQ(); return;
  }
  const seats=NS.seats||b.seats; const seatRatio=seats/b.seats;
  const rentRaw=Math.round((seats*0.7+8)*l.rent + (NS.parking?l.rent*6:0));
  const equipCost=Math.round(b.capex*(0.6+NS.equip*0.2)*(0.5+0.5*seatRatio));
  const landPrice=Math.round(rentRaw*(180+l.land*22));
  const deposit=Math.round(rentRaw*10);
  const initCost=equipCost+(NS.lease?deposit:landPrice);
  const useFin = NS.fin && equipCost<=maxBorrow('eq');
  const cashNeed = useFin? (initCost-equipCost) : initCost;
  if(G.cash<cashNeed){ flash('資金が不足しています'); return; }
  const s=makeStore(NS.biz,l,!NS.lease,NS.lease,NS.lease?deposit:0);
  if(isGen && NS.pref) s.pref=NS.pref;
  const nm=(NS.name||'').trim(); if(nm && NS.brand==='new') s.name=nm;
  s.parking=NS.parking; s.equipLv=NS.equip; s.equipBook=equipCost; s.seats=seats;
  s.deposit=NS.lease?deposit:0;
  if(!NS.lease) setOwnership(s, landPrice);
  // ブランド（既存チェーンの支店／既存単独店と新チェーン結成）
  let joinedChain=null;
  const branchLbl=(NS.branchLabel||'').trim();
  if(NS.brand && NS.brand!=='new'){
    if(NS.brand.indexOf('store:')===0){
      const baseId=NS.brand.slice(6); const base=G.stores.find(x=>x.id===baseId);
      if(base && base.biz===NS.biz){
        const id='C'+(G._chainSeq=(G._chainSeq||0)+1);
        // 既存店の名前をブランド名として採用。既存店は「本店」、新店はユーザー入力の支店名。
        G.chains[id]={id, name:base.name, biz:NS.biz, menu:Math.round(base.menu||46), concept:base.concept||'standard'};
        base.chainId=id; if(!base.branchLabel) base.branchLabel='本';
        s.chainId=id; joinedChain=G.chains[id]; s.concept=joinedChain.concept;
        s.branchLabel=branchLbl||loc(s).name;
      }
    } else if(G.chains[NS.brand] && G.chains[NS.brand].biz===NS.biz){
      s.chainId=NS.brand; joinedChain=G.chains[NS.brand]; s.concept=joinedChain.concept||'standard';
      s.branchLabel=branchLbl||loc(s).name;
    }
  }
  // 認知度：チェーン支店はチェーン規模、それ以外は同業態店舗数で開業時の客足が決まる
  const sameBrand = joinedChain? chainSize(s.chainId) : G.stores.reduce((n,o)=>n+(o.biz===NS.biz?1:0),0);
  const brandBoost=1+Math.min(sameBrand,8)*(joinedChain?0.22:0.18);
  // 立ち上げ期(J字カーブ)：新ブランド単独店は開業時の客が少なく、数年かけて常連基盤を築く。
  // チェーン支店は認知度で立ち上がりが速い。
  // 開業：看板認知の少数からスタート。チェーン支店やブランド多店舗ほど初期認知が広い（立ち上がりが速い）。
  seedOpening(s, brandBoost);
  s.staffFull=1; s.staffPart=1; s.team=[makeEmployee({spec:NS.biz})];
  s.menu = joinedChain? joinedChain.menu : 46;
  const bestSkill=(G.stores||[]).reduce((m,o)=>o!==s?Math.max(m,o.skill||0):m,0);
  s.skill=Math.round(clamp(40+bestSkill*0.35,40,62));  // 経験豊富な経営者の新店は立ち上がりの実力が高い（暖簾の知見）
  G.stores.push(s);
  // 設備資金を融資で賄う場合
  if(useFin){ bankFinance('eq', equipCost, 120, '設備資金(出店)'); }
  G.cash-=initCost; invCF(-initCost); recalcDerived();
  pushNews('新規出店',`${l.name}に『${displayName(s)}』(${b.name})を出店。チェーンは${G.stores.length}店舗に。${sameBrand>0?'既存ブランドの認知で客足は上々。':''}`,'good');
  closeModal(); go('stores'); save(); flash('新店舗をオープンしました！');
}

// 旧セーブの欠損フィールドを補完し、社員名簿と人数の整合をとる
function migrate(g){
  if(!g) return g;

   🗾 <b>出店</b>…全国の候補地に新店を出す（業態・賃借/取得・駐車場・設備を選択）</p>
   <p><b>■ お客の仕組み（最重要）</b><br>営業圏の<b>住民一人ひとりが個別の人間（ペルソナ）</b>です。年齢層・外食頻度・価格感度・自宅距離・味の好み・舌の厳しさを持ち、あなたの店との関係（認知・来店・好感度）を一人ずつ育てていきます。店舗詳細の<b>「お客様の顔ぶれ」「街の住民を見る」</b>で実際の住民を覗けます。<br>
   ・<b>開業直後は誰もあなたの店を知りません</b>。店前を通って看板を見た数人からスタート。<br>
   ・各住民は段階を踏みます：<b>看板で知る → 来店する → 満足する → 常連・ファンになる</b>。<br>
   ・<b>認知</b>は「看板（通行量）」「<b>口コミ</b>（ファンが増えるほど加速）」「<b>賑わい・話題</b>（繁盛店ほど目を引く）」「販促」で広がります。満足度が低い店は良い評判が立たず新規客が寄り付きません。<br>
   ・来店先は「<b>自店の魅力 ÷（自店＋競合の魅力）</b>」で選ばれます。魅力＝<b>好感度 × 価格の手頃感 × 近さ</b>。<br>
   ・来店して<b>満足度</b>が高いほど好感度が上がり（通うほど愛着も増しファン化）、低いと下がって離れます。ファンは高頻度で通い、友人に口コミします。<br>
   ・満足度は「<b>サービス（人員×スキル）</b>」「<b>商品力（メニュー×設備×スキル）</b>」「<b>混雑度（待ち時間）</b>」で決まります。<br>
   → だから立ち上げは<b>本当にシビア</b>。良い体験を積んで口コミの好循環（Jカーブ）に乗せるまで、赤字に耐える資金が要ります。</p>
   <p><b>■ 商店街・口コミ・ライバル店</b><br>ホーム画面には<b>商店街</b>が並び、あなたの店と近隣の競合が人気順（商圏シェア順）で表示されます。各店には<b>口コミサイトの評価（★）</b>があり、満足度に応じて遅れて形成・変動します（高評価は新規客の「発見」を呼びます）。店舗詳細から競合1店を<b>⚔️ライバル店</b>に指名すると、商圏シェアの勝敗を追跡でき、逆転すればニュースで知らされます。</p>
   <p><b>■ 従業員管理</b><br>来店が増えるほど必要人員が増えます。<b>人手不足は満足度低下→客離れ</b>。逆に暇な店で過剰雇用すると人件費で赤字に。混雑したら<b>設備更新</b>で席の回転（キャパ）を増やせます。</p>
   <p><b>■ 出店と資金繰り（銀行員の視点）</b><br>新店は立ち上げ期に赤字を垂れ流すため、<b>運転資金の余力</b>が命綱。<br>
   ・<b>DSCR</b>（営業CF÷返済額）が1.0を割ると返済原資が不足。<br>
   ・<b>同じエリアに自社店を集めすぎる</b>と客を食い合います（カニバリ）。<br>
   ・同一業態を増やすと<b>ブランド認知</b>で新店の客付きが速くなります。<br>
   ・不動産は「取得」で家賃ゼロにできますが、現金が固定化します。</p>
   <p><b>■ ゲームオーバー</b><br><b>現預金がマイナスになった時点で即・倒産</b>です（当座貸越なし）。黒字でも元金返済や出店で現金が尽きる「黒字倒産」に要注意。現金残高と月の支出（ランウェイ）を常に意識し、現金が薄くなったら運転資金の借入・経費削減・出店ペースの抑制を。40年完走でクリアです。</p>
   <p><b>■ 序盤のコツ</b><br>開業直後は<b>1日数人</b>からのスタート。焦って人を雇いすぎず固定費を抑え、まず1号店の<b>満足度</b>を上げて来た客をファンに変えること。ファンが増えると<b>口コミ・話題</b>で認知が加速し、ある時点から客足が一気に伸びます（Jカーブ）。黒字化→現金を厚く→<b>DSCRに余裕</b>がある範囲で慎重に2号店。<b>立ち上げの赤字を支える運転資金</b>を切らさないことが最重要。最初から急拡大すると一発で資金ショートします。</p>
   <p><b>■ セーブ</b><br><b>自動保存</b>（毎月・各操作ごと）。右上「≡ メニュー」から手動セーブ・ロード・タイトルへ戻る・やり直しができます。</p>
  </div>
  <button class="btn primary" onclick="closeModal()">とじる</button>`);
}

function doGameOver(won){
  G.gameover=true; G.won=won;
  const eq=totalEquity(), debt=totalDebt(), assets=totalAssets(), stores=G.stores.length;
  const best=Number(localStorage.getItem(BEST_KEY)||0);
  if(eq>best){ try{localStorage.setItem(BEST_KEY,String(eq));}catch(e){} }
  try{localStorage.removeItem(SAVE_KEY);}catch(e){} MEM_SAVE=null;
  const ts=$('titleScreen');
  ts.className='title over';
  let title = won? '🎉 四十年の集大成' : '💥 資金ショート（倒産）';
  let body;
  if(won){
    body=`40年間の経営、お疲れさまでした。<br>最終的に <b style="color:var(--gold-bright)">${stores}店舗</b> のチェーンを築き上げました。<br><br>
     最終純資産（スコア）<br><b style="font-size:26px;color:var(--gold-bright);font-family:var(--mono)">${yen(eq*1000)}</b>`;
  } else {
    body=`現金が尽き、事業の継続が不可能になりました。<br>外食経営で利益より先に尽きるのは資金です。<br><br>
     <div style="text-align:left;display:inline-block;font-size:12px;line-height:1.9">
       倒産時に残った負債：<b style="color:var(--crimson);font-family:var(--mono)">${yen(debt*1000)}</b><br>
       保有資産（簿価）：<span style="font-family:var(--mono)">${yen(assets*1000)}</span><br>
       純資産（最終スコア）：<b style="font-family:var(--mono);color:${eq>=0?'var(--gold-bright)':'var(--crimson)'}">${yen(eq*1000)}</b><br>
       店舗数：${stores}店</div>`;
  }
  ts.innerHTML=`<div class="big">${won?'<span class="red">大</span>団円':'<span class="red">無</span>念'}</div>
   <div class="sub2">${title}</div>
   <div class="divider-jp">❖</div>
   <div class="story">${body}<br><br>
   <span style="font-size:11px">${G.year-1>0?G.year-1:G.year}年 ${monthName(((G.month-2+12)%12)+1)}まで経営 ／ ${G.owner}（${G.age}歳）</span></div>
   <div class="scoreflash">自己ベスト：${yen(Math.max(best,eq)*1000)}</div>
   <div style="height:14px"></div>
   <button class="btn primary" onclick="location.reload()">もう一度</button>`;
  ts.style.display='flex';
}

/* ---------- 起動 ---------- */
window.addEventListener('load',()=>{
  const best=Number(localStorage.getItem(BEST_KEY)||0);
  if(best>0) $('bestScore').textContent='自己ベスト純資産：'+yen(best*1000);
});
let toastT;
function flash(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1700); }

/* =====================================================================
   演出：KPI数値のカウントアニメ ＋ 営業ライブシアター（情報は不変）
   ===================================================================== */
// 数値を前回値からカウントアップ／ダウンで補間表示（差分があれば増減フラッシュ）
function animateNumber(el, to, fmt){
  if(!el) return;
  const from = (el.__cur!=null)? el.__cur : to;
  el.__cur = to;
  if(from===to){ el.textContent=fmt(to); return; }
  const box=el.closest('.kpi');
  if(box){ box.classList.remove('flash-up','flash-dn'); void box.offsetWidth; box.classList.add(to>from?'flash-up':'flash-dn'); }
  const start=performance.now(), dur=720;
  cancelAnimationFrame(el.__raf||0);
  const step=now=>{ const k=clamp((now-start)/dur,0,1); const e=1-Math.pow(1-k,3);
    el.textContent=fmt(from+(to-from)*e);
    if(k<1) el.__raf=requestAnimationFrame(step); else el.textContent=fmt(to); };
  el.__raf=requestAnimationFrame(step);
}

const GUEST_EMO=['🚶','🚶‍♀️','🧑','👩','👨','👴','👵','🧓','👦','👧','🧑‍🦰','👱','🧕','👨‍🦱','👩‍🦱','🧑‍🍳'];
const LIVE={running:false,advanced:false,timers:[]};
function liveClear(){ LIVE.timers.forEach(t=>clearTimeout(t)); LIVE.timers=[]; }
function liveAfter(ms,fn){ const t=setTimeout(fn,ms); LIVE.timers.push(t); return t; }
function liveRunAdvance(){ if(LIVE.advanced) return; LIVE.advanced=true; advanceMonth(); }

// 月送り＝1ヶ月の営業を実況。暖簾→開店→客足→売上→閉店→結果。タップでスキップ。
function advanceMonthAnimated(){
  if(!G || G.gameover) return;
  if(LIVE.running) return;
  LIVE.running=true; LIVE.advanced=false; liveClear();
  const root=$('liveTheater'), noren=$('liveNoren'), lane=$('liveLane'),
        coins=$('liveCoins'), ticker=$('liveTicker'), prog=$('liveProgBar'), result=$('liveResult');
  lane.innerHTML=''; coins.innerHTML=''; result.className='live-result'; result.innerHTML='';
  prog.style.transition='none'; prog.style.width='0%'; noren.classList.remove('down');
  ticker.textContent='のれんを掛けています…';
  root.classList.add('show');
  liveAfter(60,()=>noren.classList.add('down'));
  liveAfter(620,()=>{ ticker.textContent='開店 ─ 本日も繁盛しますように'; });
  liveAfter(720,()=>{ spawnGuests(); ticker.textContent='昼の部 営業中…'; prog.style.transition='width 1.25s linear'; prog.style.width='60%'; });
  liveAfter(1000,()=>liveRunAdvance());          // ここで当月の損益を確定（裏で計算）
  liveAfter(1500,()=>{ ticker.textContent='夜の部 営業中…'; });
  liveAfter(1950,()=>{ ticker.textContent='本日、のれんを下ろします'; prog.style.transition='width .45s ease'; prog.style.width='100%'; });
  liveAfter(2100,()=>{ showLiveResult(); spawnCoins(); });
  liveAfter(4400,()=>finishLive());
}
function spawnGuests(){
  const lane=$('liveLane'); if(!lane) return;
  const visits=G.stores.reduce((t,s)=>t+(s.lastVisits||0),0);
  const n=clamp(Math.round(8+Math.log10(Math.max(10,visits))*7),10,34);   // 来店規模を体数にマップ
  const w=lane.clientWidth||400;
  for(let i=0;i<n;i++){
    const g=document.createElement('div'); g.className='live-guest';
    g.textContent=GUEST_EMO[Math.floor(Math.random()*GUEST_EMO.length)];
    const startX=rnd(-30,w*0.18), gx=rnd(w*0.33,w*0.6)-startX;
    g.style.left=startX+'px'; g.style.setProperty('--gx',gx.toFixed(0)+'px');
    g.style.fontSize=rnd(20,30).toFixed(0)+'px';
    g.style.animation=`guestWalk ${rnd(1.1,1.9).toFixed(2)}s ease-in ${rnd(0,1.6).toFixed(2)}s forwards`;
    lane.appendChild(g);
  }
}
function spawnCoins(){
  const coins=$('liveCoins'); if(!coins) return;
  const net=G.pl?G.pl.net:0, good=net>=0;
  const w=coins.clientWidth||400, h=coins.clientHeight||300, n=good?22:8;
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='live-coin';
    c.textContent= good?(Math.random()<0.5?'🪙':'💴'):'💸';
    c.style.left=(w/2+rnd(-44,44)).toFixed(0)+'px'; c.style.top=(h*0.5).toFixed(0)+'px';
    c.style.setProperty('--cx',rnd(-w*0.42,w*0.42).toFixed(0)+'px');
    c.style.setProperty('--cy',(good?-1:1)*rnd(h*0.28,h*0.55).toFixed(0)+'px');
    c.style.setProperty('--cr',rnd(-230,230).toFixed(0)+'deg');
    c.style.animation=`coinPop ${rnd(1.0,1.8).toFixed(2)}s ease-out ${rnd(0,0.5).toFixed(2)}s forwards`;
    coins.appendChild(c);
  }
}
function showLiveResult(){
  const result=$('liveResult'); if(!result) return;
  const p=G.pl||{rev:0,net:0}, net=p.net||0, good=net>=0;
  const visits=G.stores.reduce((t,s)=>t+(s.lastVisits||0),0), eq=totalEquity();
  const mLabel=monthName(((G.month-2+12)%12)+1); // 直前に締めた月
  result.innerHTML=
    `<h4>${G.year}年目 ${mLabel} 営業結果<span style="font-family:var(--mono);font-size:11px;color:var(--txt-dim)">第${G.year}期</span></h4>
     <div class="live-rrow"><span class="rk">📥 来店客数</span><span class="rv">${visits.toLocaleString()} 人</span></div>
     <div class="live-rrow"><span class="rk">🍚 月商</span><span class="rv">${yen(p.rev*1000)}</span></div>
     <div class="live-rrow"><span class="rk">${good?'🟢 黒字':'🔴 赤字'}（月次純利益）</span><span class="rv ${good?'pos':'neg'}" style="font-size:18px">${yen(net*1000)}</span></div>
     <div class="live-rrow"><span class="rk">🏯 純資産（スコア）</span><span class="live-net" style="color:${eq>=0?'var(--gold)':'var(--crimson)'}">${yen(eq*1000)}</span></div>`;
  void result.offsetWidth; result.classList.add('show');
}
function finishLive(){
  if(!LIVE.running) return;
  liveClear();
  if(!LIVE.advanced) liveRunAdvance();          // スキップで未計算なら確定
  const root=$('liveTheater'); if(root) root.classList.remove('show');
  LIVE.running=false;
}
function skipLive(){
  if(!LIVE.running) return;
  if(!LIVE.advanced){ liveClear(); liveRunAdvance(); showLiveResult(); spawnCoins(); liveAfter(1500,()=>finishLive()); return; }
  finishLive();
}
